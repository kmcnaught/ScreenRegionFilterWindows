name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild cpp/MagnifierSample.sln /p:Configuration=Release /p:Platform=x64

      - name: Create zip
        run: Compress-Archive -Path cpp/x64/Release/ScreenFilterWindow.exe -DestinationPath ScreenInversion-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ScreenInversion-${{ github.ref_name }}.zip
